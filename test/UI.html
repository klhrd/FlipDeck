<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>單字卡 UI 模擬器</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* 3D 翻轉與自訂樣式 */
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        /* 避免在手機上長按選取文字影響滑動體驗 */
        .touch-none { touch-action: none; }
    </style>
</head>
<body class="min-h-screen bg-neutral-50 text-neutral-800 font-sans flex flex-col items-center py-6 px-4 select-none">

    <!-- Header -->
    <header class="mb-12 text-center max-w-2xl">
        <h1 class="text-3xl font-light tracking-wide mb-3 text-neutral-900">單字卡 UI 模擬器</h1>
        <p class="text-neutral-500 font-light text-sm tracking-wide">
            極簡設計風格 (Minimalist) • 探索 5 種不同的學習互動體驗
        </p>
    </header>

    <!-- Navigation / Mode Selector -->
    <nav id="nav-container" class="flex flex-wrap justify-center gap-2 mb-12 max-w-3xl"></nav>

    <!-- Main Interactive Area -->
    <main id="main-container" class="relative w-full max-w-md h-[400px] flex items-center justify-center"></main>

    <!-- Footer Info -->
    <footer class="mt-16 text-center text-neutral-400 text-xs flex flex-col items-center gap-2">
        <p id="footer-desc" class="max-w-md leading-relaxed"></p>
    </footer>

    <script>
        // ==========================================
        // 資料定義
        // ==========================================
        const WORDS = [
            { id: 1, word: 'Ephemeral', meaning: '短暫的；轉瞬即逝的', example: 'Fame in the world of rock and roll is largely ephemeral.' },
            { id: 2, word: 'Serendipity', meaning: '不期而遇的美好；機緣湊巧', example: 'Finding this book at the flea market was pure serendipity.' },
            { id: 3, word: 'Resilience', meaning: '韌性；恢復力', example: 'He showed great resilience in overcoming his difficulties.' },
            { id: 4, word: 'Eloquent', meaning: '雄辯的；有說服力的', example: 'She made an eloquent appeal for action.' },
            { id: 5, word: 'Pragmatic', meaning: '務實的；實用主義的', example: 'We need to adopt a pragmatic approach to the problem.' }
        ];

        const MODES = [
            { id: 'flip', name: '經典翻轉', icon: 'refresh-cw', desc: '點擊進行 Y 軸 180 度旋轉。' },
            { id: 'split', name: '並排/模糊', icon: 'eye', desc: '答案預設模糊，點擊後清晰。' },
            { id: 'toggle', name: '瞬間切換', icon: 'mouse-pointer-click', desc: '零延遲切換，背景微調。' },
            { id: 'swipe', name: '左右滑動', icon: 'arrow-left-right', desc: '左滑忘記，右滑學會。' },
            { id: 'stack', name: '堆疊抽卡', icon: 'layers', desc: '點擊飛走，露出下一張。' }
        ];

        // ==========================================
        // 狀態管理
        // ==========================================
        let activeMode = 'flip';
        let currentIndex = 0;
        
        // 用來清理 Swipe 模式的全域事件
        let swipeMoveHandler = null;
        let swipeUpHandler = null;

        // ==========================================
        // 核心邏輯
        // ==========================================
        function setMode(modeId) {
            activeMode = modeId;
            currentIndex = 0; // 切換模式時重置進度
            renderAll();
        }

        window.nextCard = function() {
            if (currentIndex < WORDS.length) {
                currentIndex++;
                renderMain(); // 只重新渲染卡片區域，保證每次都是全新狀態 (解決閃現問題)
            }
        };

        window.resetApp = function() {
            currentIndex = 0;
            renderMain();
        };

        // ==========================================
        // 渲染函數
        // ==========================================
        function renderAll() {
            renderNav();
            renderMain();
            renderFooter();
        }

        function renderNav() {
            const container = document.getElementById('nav-container');
            container.innerHTML = MODES.map(mode => `
                <button
                    onclick="setMode('${mode.id}')"
                    class="flex items-center gap-2 px-5 py-2.5 rounded-full text-sm transition-all duration-300 ${
                        activeMode === mode.id
                            ? 'bg-neutral-900 text-white shadow-md'
                            : 'bg-white text-neutral-600 border border-neutral-200 hover:border-neutral-300 hover:bg-neutral-100'
                    }"
                >
                    <i data-lucide="${mode.icon}" class="w-4 h-4"></i>
                    <span class="font-medium">${mode.name}</span>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function renderFooter() {
            const currentModeObj = MODES.find(m => m.id === activeMode);
            document.getElementById('footer-desc').innerHTML = `
                <strong class="text-neutral-600 font-medium">${currentModeObj.name}：</strong>
                ${currentModeObj.desc}
            `;
        }

        function renderMain() {
            const container = document.getElementById('main-container');
            
            // 清理舊的事件綁定
            if (swipeMoveHandler) window.removeEventListener('pointermove', swipeMoveHandler);
            if (swipeUpHandler) window.removeEventListener('pointerup', swipeUpHandler);

            // 判斷是否結束
            if (currentIndex >= WORDS.length) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center animate-fade-in">
                        <div class="w-16 h-16 bg-green-50 text-green-600 rounded-full flex items-center justify-center mb-4">
                            <i data-lucide="refresh-cw" class="w-6 h-6"></i>
                        </div>
                        <h2 class="text-xl font-medium mb-2">學習完成！</h2>
                        <p class="text-neutral-500 mb-6 text-sm">您已複習完所有單字</p>
                        <button onclick="resetApp()" class="px-6 py-2 bg-neutral-900 text-white rounded-full text-sm font-medium hover:bg-neutral-800 transition-colors">
                            重新開始
                        </button>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            const word = WORDS[currentIndex];
            let html = '';

            // 根據模式渲染 (每次都是輸出全新的 HTML，徹底斷絕動畫閃現問題)
            switch (activeMode) {
                case 'flip': html = getFlipCardHTML(word); break;
                case 'split': html = getSplitCardHTML(word); break;
                case 'toggle': html = getToggleCardHTML(word); break;
                case 'swipe': html = getSwipeCardHTML(word); break;
                case 'stack': html = getStackDeckHTML(); break;
            }

            container.innerHTML = html;
            lucide.createIcons();

            // 特殊模式初始化
            if (activeMode === 'swipe') initSwipeLogic();
        }

        // ==========================================
        // 1. 經典 3D 翻轉式 (Flip Card)
        // ==========================================
        function getFlipCardHTML(word) {
            // HTML 注入 onClick，點擊切換 class
            return `
                <div class="w-full h-full perspective-1000 relative group" onclick="this.querySelector('.card-inner').classList.toggle('rotate-y-180')">
                    <div class="card-inner w-full h-full absolute top-0 left-0 transition-all duration-500 preserve-3d cursor-pointer">
                        <!-- Front -->
                        <div class="absolute inset-0 backface-hidden bg-white border border-neutral-200 rounded-3xl shadow-sm flex flex-col items-center justify-center p-8 hover:shadow-md transition-shadow">
                            <span class="text-neutral-400 text-xs tracking-widest uppercase mb-6 absolute top-8">Tap to flip</span>
                            <h2 class="text-4xl font-light text-neutral-900 tracking-wide">${word.word}</h2>
                        </div>
                        <!-- Back -->
                        <div class="absolute inset-0 backface-hidden rotate-y-180 bg-neutral-900 text-white rounded-3xl shadow-lg flex flex-col items-center justify-center p-8">
                            <h3 class="text-2xl font-medium mb-4">${word.meaning}</h3>
                            <p class="text-neutral-400 text-center text-sm leading-relaxed mb-8">"${word.example}"</p>
                            <button onclick="event.stopPropagation(); nextCard()" class="absolute bottom-8 px-6 py-2 bg-white text-neutral-900 rounded-full text-sm font-medium hover:bg-neutral-100 transition-colors">
                                下一張
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // 2. 並排展開式 (Split View with Blur)
        // ==========================================
        window.revealSplitCard = function(el) {
            el.querySelector('.blur-content').className = 'transition-all duration-500 w-full h-full flex flex-col items-center justify-center opacity-100 filter-none';
            el.querySelector('.hint-overlay').style.display = 'none';
            el.querySelector('.btn-container').innerHTML = `
                <button onclick="event.stopPropagation(); nextCard()" class="absolute bottom-4 right-4 px-4 py-1.5 bg-neutral-900 text-white rounded-full text-xs font-medium hover:bg-neutral-800 transition-colors">
                    下一張
                </button>
            `;
        };

        function getSplitCardHTML(word) {
            return `
                <div class="w-full h-full bg-white border border-neutral-200 rounded-3xl shadow-sm flex flex-col overflow-hidden">
                    <div class="flex-1 flex items-center justify-center p-8 border-b border-neutral-100">
                        <h2 class="text-4xl font-light text-neutral-900 tracking-wide">${word.word}</h2>
                    </div>
                    <div class="flex-1 relative cursor-pointer group bg-neutral-50/50 p-8 flex flex-col items-center justify-center" onclick="revealSplitCard(this)">
                        <div class="blur-content transition-all duration-500 w-full h-full flex flex-col items-center justify-center opacity-60 blur-md pointer-events-none">
                            <h3 class="text-xl font-medium text-neutral-800 mb-3">${word.meaning}</h3>
                            <p class="text-neutral-500 text-center text-sm leading-relaxed">${word.example}</p>
                        </div>
                        <div class="hint-overlay absolute inset-0 flex items-center justify-center group-hover:bg-black/5 transition-colors">
                            <div class="bg-white/80 backdrop-blur-sm px-4 py-2 rounded-full flex items-center gap-2 text-neutral-700 text-sm font-medium shadow-sm border border-neutral-200/50">
                                <i data-lucide="eye" class="w-4 h-4"></i>
                                <span>點擊查看解答</span>
                            </div>
                        </div>
                        <div class="btn-container"></div>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // 3. 點擊瞬間切換 (Toggle / Instant Swap)
        // ==========================================
        window.toggleInstantCard = function(el) {
            if (el.dataset.revealed === 'true') return;
            el.dataset.revealed = 'true';
            
            // 瞬間切換樣式與內容
            el.className = "w-full h-full rounded-3xl shadow-sm flex flex-col items-center justify-center p-8 cursor-pointer select-none border bg-blue-50/50 border-blue-100";
            el.innerHTML = `
                <div class="flex flex-col items-center w-full h-full justify-between">
                    <div class="flex-1 flex flex-col items-center justify-center">
                        <h3 class="text-2xl font-medium text-blue-900 mb-4">${WORDS[currentIndex].meaning}</h3>
                        <p class="text-blue-700/70 text-center text-sm leading-relaxed max-w-xs">"${WORDS[currentIndex].example}"</p>
                    </div>
                    <button onclick="event.stopPropagation(); nextCard()" class="mt-auto px-8 py-2.5 bg-blue-600 text-white rounded-full text-sm font-medium hover:bg-blue-700 active:bg-blue-800">
                        下一張 (Space)
                    </button>
                </div>
            `;
        };

        function getToggleCardHTML(word) {
            return `
                <div data-revealed="false" class="w-full h-full rounded-3xl shadow-sm flex flex-col items-center justify-center p-8 cursor-pointer select-none border bg-white border-neutral-200 hover:border-neutral-300" onclick="toggleInstantCard(this)">
                    <div class="flex flex-col items-center">
                        <span class="text-neutral-300 flex items-center gap-1 text-xs tracking-widest uppercase mb-8">
                            <i data-lucide="mouse-pointer-click" class="w-3.5 h-3.5"></i> 瞬間切換
                        </span>
                        <h2 class="text-5xl font-light text-neutral-900 tracking-wide">${word.word}</h2>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // 4. 左右滑動判定 (Tinder Swipe)
        // ==========================================
        window.revealSwipeAnswer = function(e) {
            e.stopPropagation();
            const word = WORDS[currentIndex];
            const content = document.getElementById('swipe-content');
            content.innerHTML = `
                <h3 class="text-2xl font-medium text-neutral-900 mb-4">${word.meaning}</h3>
                <p class="text-neutral-500 text-center text-sm leading-relaxed max-w-xs">"${word.example}"</p>
                <div class="absolute bottom-6 text-neutral-400 text-xs font-medium flex items-center gap-2 pointer-events-none animate-pulse">
                    <i data-lucide="arrow-left-right" class="w-3.5 h-3.5"></i> 左右滑動判定
                </div>
            `;
            lucide.createIcons();
        };

        function getSwipeCardHTML(word) {
            return `
                <div class="w-full h-full relative flex items-center justify-center">
                    <!-- Background hint indicators -->
                    <div class="absolute inset-0 flex justify-between items-center px-4 pointer-events-none z-0">
                        <div id="hint-forgot" class="w-16 h-16 rounded-full bg-red-100 text-red-500 flex items-center justify-center transition-opacity opacity-0">
                            <span class="font-medium text-sm">忘記</span>
                        </div>
                        <div id="hint-learned" class="w-16 h-16 rounded-full bg-green-100 text-green-500 flex items-center justify-center transition-opacity opacity-0">
                            <span class="font-medium text-sm">學會</span>
                        </div>
                    </div>

                    <!-- Swipeable Card -->
                    <div id="swipe-card" class="absolute w-full h-full bg-white border border-neutral-200 rounded-3xl shadow-sm flex flex-col items-center justify-center p-8 select-none touch-none cursor-grab active:cursor-grabbing z-10 transition-all duration-300 ease-out">
                        
                        <!-- Status Stamps -->
                        <div id="stamp-forgot" class="absolute top-8 left-8 border-2 border-red-500 text-red-500 font-bold px-3 py-1 rounded -rotate-12" style="opacity: 0;">忘記</div>
                        <div id="stamp-learned" class="absolute top-8 right-8 border-2 border-green-500 text-green-500 font-bold px-3 py-1 rounded rotate-12" style="opacity: 0;">學會</div>

                        <div id="swipe-content" class="w-full h-full flex flex-col items-center justify-center">
                            <h2 class="text-4xl font-light text-neutral-900 tracking-wide mb-8">${word.word}</h2>
                            <button onclick="revealSwipeAnswer(event)" class="mt-4 px-6 py-2 bg-neutral-100 text-neutral-600 rounded-full text-xs font-medium hover:bg-neutral-200 transition-colors pointer-events-auto">
                                點擊看答案
                            </button>
                            <div class="absolute bottom-6 flex gap-12 text-neutral-300 text-xs mt-8 pointer-events-none">
                                <span class="flex items-center gap-1"><i data-lucide="arrow-left-right" class="w-3 h-3"></i> 左滑忘記</span>
                                <span class="flex items-center gap-1">右滑學會 <i data-lucide="arrow-left-right" class="w-3 h-3"></i></span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function initSwipeLogic() {
            const card = document.getElementById('swipe-card');
            if (!card) return;

            let isDragging = false;
            let startX = 0;
            let dragX = 0;

            card.addEventListener('pointerdown', (e) => {
                isDragging = true;
                startX = e.clientX;
                card.classList.remove('transition-all', 'duration-300', 'ease-out');
            });

            swipeMoveHandler = (e) => {
                if (!isDragging) return;
                dragX = e.clientX - startX;
                const rotation = dragX * 0.05;
                card.style.transform = `translateX(${dragX}px) rotate(${rotation}deg)`;

                // 背景提示圓點
                document.getElementById('hint-forgot').style.opacity = dragX < -20 ? 1 : 0;
                document.getElementById('hint-learned').style.opacity = dragX > 20 ? 1 : 0;

                // 卡片上的印章
                document.getElementById('stamp-forgot').style.opacity = Math.min(Math.max(-dragX / 100, 0), 1);
                document.getElementById('stamp-learned').style.opacity = Math.min(Math.max(dragX / 100, 0), 1);
            };

            swipeUpHandler = () => {
                if (!isDragging) return;
                isDragging = false;
                card.classList.add('transition-all', 'duration-300', 'ease-out');

                const threshold = 100;
                if (dragX > threshold) {
                    // 往右滑出
                    card.style.transform = `translateX(500px) rotate(25deg)`;
                    card.style.opacity = '0';
                    setTimeout(nextCard, 300);
                } else if (dragX < -threshold) {
                    // 往左滑出
                    card.style.transform = `translateX(-500px) rotate(-25deg)`;
                    card.style.opacity = '0';
                    setTimeout(nextCard, 300);
                } else {
                    // 彈回原位
                    dragX = 0;
                    card.style.transform = `translateX(0px) rotate(0deg)`;
                    document.getElementById('stamp-forgot').style.opacity = 0;
                    document.getElementById('stamp-learned').style.opacity = 0;
                }
            };

            window.addEventListener('pointermove', swipeMoveHandler);
            window.addEventListener('pointerup', swipeUpHandler);
        }

        // ==========================================
        // 5. 堆疊抽卡式 (Stack Deck)
        // ==========================================
        window.handleStackClick = function(el) {
            if (el.dataset.animating === 'true') return;
            el.dataset.animating = 'true';
            
            // 飛走動畫
            el.style.transform = 'translateY(-100px) rotate(5deg) scale(0.9)';
            el.style.opacity = '0';
            
            // 動畫結束後切換下一題，因為切換會整組重建 DOM，所以下層卡片會自動浮上來
            setTimeout(nextCard, 400);
        };

        function getStackDeckHTML() {
            const visibleWords = WORDS.slice(currentIndex, currentIndex + 3);
            let cardsHTML = '';

            // 從下往上渲染，確保 z-index 正確
            visibleWords.forEach((wordObj, index) => {
                const isTop = index === 0;
                const translateY = index * 16;
                const scale = 1 - index * 0.05;
                const zIndex = 30 - index;
                const opacity = 1 - index * 0.2;

                const topCardContent = `
                    <div class="flex flex-col items-center h-full justify-center w-full relative">
                        <span class="absolute top-0 text-neutral-300 text-xs tracking-widest uppercase flex items-center gap-1">
                            <i data-lucide="hand" class="w-3.5 h-3.5"></i> Click to draw
                        </span>
                        <h2 class="text-4xl font-light text-neutral-900 tracking-wide mb-6">${wordObj.word}</h2>
                        <div class="w-12 h-[1px] bg-neutral-200 mb-6"></div>
                        <h3 class="text-lg font-medium text-neutral-600 mb-2">${wordObj.meaning}</h3>
                    </div>
                `;

                const backCardContent = `
                    <h2 class="text-4xl font-light text-neutral-300 tracking-wide">${wordObj.word}</h2>
                `;

                cardsHTML += `
                    <div 
                        data-animating="false"
                        ${isTop ? 'onclick="handleStackClick(this)"' : ''}
                        class="absolute w-full h-[85%] bg-white border border-neutral-200 rounded-3xl flex flex-col items-center justify-center p-8 transition-all duration-400 ease-out ${isTop ? 'cursor-pointer hover:border-neutral-300 shadow-sm' : 'pointer-events-none'}"
                        style="transform: translateY(${translateY}px) scale(${scale}); opacity: ${opacity}; z-index: ${zIndex};"
                    >
                        ${isTop ? topCardContent : backCardContent}
                    </div>
                `;
            });

            return `<div class="w-full h-full relative flex items-center justify-center perspective-1000">${cardsHTML}</div>`;
        }

        // ==========================================
        // 初始化應用程式
        // ==========================================
        renderAll();

    </script>
</body>
</html>
